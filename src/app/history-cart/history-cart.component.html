
    <div  class="row Content"  >


        <section class="col-md-9" style="height: auto;" >

            <table class="table table-striped">
                <thead style="background-color: gold">
                  <tr>
                    <th scope="col">Id</th>
                    <th scope="col">Image</th>
                    <th scope="col">Name</th>
                    <th scope="col">Time</th>
                    <th scope="col">Price</th>
                    <th scope="col">Chef</th>
                  </tr>
                </thead>
                <tbody >
                  <tr  *ngFor="let cart of carts; let i = index">
                    <th scope="row">{{i}}</th>
                    <td> <img src ='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_qQNX1BpIFTRUuFWP-HrDAQv_sdia2y8EffQHxArvPT4FlIw&s' style="width: 100px; height: 60px;  border-radius: 20px 0px; "> </td>

                    <td> 20  EGP</td>

                  </tr>
                </tbody>
              </table>

        </section>



        <section  class="col-sm-3"  >
            <div  style="box-shadow: 0px 0px 10px #a7a7a7; padding:20px; margin-top: 20%;">
                    <h3 class="text-center">Summary</h3>
                    <br><BR>

                    <ul class="list-group">
                        <li class="list-group-item" style="border: 1px solid #d1d0d0">
                            <h5>Total Orders</h5>
                            <small style="float:right ; font-size: 20px"> 20 Orders</small>
                        </li>
                      <br>

                        <li class="list-group-item" style="border: 1px solid #d1d0d0">
                            <h5>Total Price</h5>
                            <small style="float:right ; font-size: 20px;"> 200 EGP</small>
                        </li>


                      </ul>

            </div>

        </section>



    </div>
